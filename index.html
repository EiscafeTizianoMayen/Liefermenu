    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function renderMenuItem(item) {
      const ingredients = item.ingredients
        ? `<p class="ingredients">(${escapeHtml(item.ingredients)})</p>`
        : "";

      const flavors = item.flavors && item.flavors.length
        ? `<ul class="flavors">${item.flavors.map(flavor => `<li>${escapeHtml(flavor)}</li>`).join("")}</ul>`
        : "";

      return `
        <article class="menu-item">
          <div class="item-line">
            <div class="item-name">${escapeHtml(item.name)}</div>
            <div class="leader"></div>
            <div class="price">${escapeHtml(item.price)}</div>
          </div>
          ${ingredients}
          ${flavors}
        </article>
      `;
    }

    function renderSection(section) {
      const notice = section.notice
        ? `<div class="big-text">${escapeHtml(section.notice)}</div>`
        : "";

      return `
        <section class="card ${section.notice ? "notice-card" : ""}" id="${escapeHtml(section.id)}">
          <div class="section-head">
            <div class="icon ${escapeHtml(section.color || "green")}">${section.icon}</div>
            <div>
              <h2>${escapeHtml(section.title)}</h2>
              <p class="desc">${escapeHtml(section.description || "")}</p>
            </div>
          </div>
          ${notice}
          <div class="menu-list">
            ${section.items.map(renderMenuItem).join("")}
          </div>
        </section>
      `;
    }

    function renderNav() {
      const nav = document.getElementById("nav");

        <a class="nav-btn" href="#${escapeHtml(section.id)}">${section.icon} ${escapeHtml(section.title)}</a>
      `).join("");
    }

    function renderAll() {
      document.getElementById("menu").innerHTML = menuSections.map(renderSection).join("");
      renderNav();
    }

    renderAll();
  </script>
</body>
</html>
